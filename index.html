<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Tailwind Buttons</title>
</head>

<body class="bg-black">

<div class="min-h-screen flex flex-col items-center justify-center gap-8 p-6">

    <!-- Top Buttons -->
    <div class="flex flex-col sm:flex-row flex-wrap gap-4 justify-center">

        <button class="px-6 py-2 bg-pink-600 hover:bg-pink-700 text-white">
            Sign Up
        </button>

        <button class="px-6 py-2 border-2 border-pink-600 text-pink-600 hover:bg-pink-600 hover:text-white flex items-center gap-2">
            Link
            <i class="fa-solid fa-link"></i>
        </button>

        <button class="px-6 py-2 bg-yellow-600 text-white hover:bg-pink-600 flex items-center gap-2 rounded-md">
            Login
            <i class="fa-solid fa-link"></i>
        </button>

        <button class="px-6 py-2 border-2 border-yellow-600 text-yellow-600 flex items-center gap-2">
            Search
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

    </div>


    <!-- Middle Buttons -->
    <div class="flex flex-col sm:flex-row flex-wrap gap-4 justify-center">

        <button class="px-6 py-2 bg-green-600 hover:bg-lime-700 rounded-lg text-white">
            <i class="fa-solid fa-circle mr-2"></i>
            Link-05
        </button>

        <button class="px-6 py-2 border border-green-600 text-green-600 rounded-md">
            <i class="fa-solid fa-circle mr-2"></i>
            Link-06
        </button>

        <button class="px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white flex items-center gap-2">
            Play Now
            <i class="fa-solid fa-play"></i>
        </button>

        <button class="px-6 py-2 bg-blue-500 hover:bg-red-700 text-white rounded-lg flex items-center gap-2">
            More Article
            <i class="fa-solid fa-arrow-right"></i>
        </button>

    </div>


    <!-- Bottom Buttons -->
    <div class="flex flex-col sm:flex-row items-center gap-6 flex-wrap justify-center">

        <!-- Star Button -->
        <div class="flex">

            <button class="px-6 py-2 border border-white text-yellow-600 flex items-center gap-2">
                <i class="fa-solid fa-star text-yellow-500"></i>
                Starred
            </button>

            <button class="px-3 py-2 border border-white text-white">
                <i class="fa-solid fa-chevron-down"></i>
            </button>

        </div>


        <!-- Cart -->
        <div class="relative">
            <i class="fa-solid fa-cart-shopping fa-2xl text-white"></i>

            <span class="absolute -top-2 -right-3 bg-red-500 px-2 py-0.5 rounded-full text-xs text-white">
                0
            </span>
        </div>


        <button class="px-6 py-2 bg-white rounded-full">
            <i class="fa-solid fa-circle mr-2"></i>
            Light
        </button>

        <button class="px-6 py-2 border border-white text-white rounded-full">
            <i class="fa-solid fa-circle mr-2"></i>
            Dark
        </button>

    </div>

</div>

</body>
</html>
